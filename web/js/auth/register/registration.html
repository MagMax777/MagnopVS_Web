<style>
        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(1000%); }
        }
        @keyframes pulse-cyan {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 245, 255, 0.4); }
            50% { box-shadow: 0 0 30px rgba(0, 245, 255, 0.8); }
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(-2px, -1px); }
            60% { transform: translate(2px, 1px); }
            80% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }
        .glitch-hover:hover {
            animation: glitch 0.1s linear infinite;
        }
        .scan-overlay {
            background: linear-gradient(to bottom, transparent, rgba(0, 245, 255, 0.05), transparent);
            height: 10%;
            width: 100%;
            position: absolute;
            animation: scan-line 8s linear infinite;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 245, 255, 0.2);
        }
        .energy-input {
            border: none;
            border-bottom: 1px solid #424656;
            background: transparent !important;
            color: #e4e2e2;
            transition: all 0.3s ease;
        }
        .energy-input:focus {
            outline: none;
            border-bottom-color: #ff00ff;
            box-shadow: 0 4px 10px -5px rgba(255, 0, 255, 0.3);
        }
        .energy-input:focus + .scanning-label {
            opacity: 1;
        }
        .scanning-label {
            opacity: 0;
            transition: opacity 0.3s;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #ff00ff;
        }
        .matrix-bg {
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 245, 255, 0.05) 0%, transparent 80%);
        }
    </style>
