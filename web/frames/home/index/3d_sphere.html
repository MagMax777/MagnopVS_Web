<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_524 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_524" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_524');
  if (!container || typeof THREE === 'undefined') return;

  const devicePixelRatio = window.devicePixelRatio || 1;
  const scene = new THREE.Scene();
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  const group = new THREE.Group();
  scene.add(group);

  const material1 = new THREE.MeshPhongMaterial({
    color: 0x00ccff,
    wireframe: true,
    transparent: true,
    opacity: 0.6,
    shininess: 100
  });

  const material2 = new THREE.MeshPhongMaterial({
    color: 0xff4fd8,
    wireframe: true,
    transparent: true,
    opacity: 0.3,
    shininess: 80
  });

  const innerCube = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 2), material1);
  const outerCube = new THREE.Mesh(new THREE.IcosahedronGeometry(3.5, 1), material2);

  group.add(innerCube);
  group.add(outerCube);

  const light = new THREE.PointLight(0x00ccff, 2, 50);
  light.position.set(5, 5, 5);
  scene.add(light);

  const ambientLight = new THREE.AmbientLight(0x404040);
  scene.add(ambientLight);

  camera.position.z = 8;

  function animate() {
    requestAnimationFrame(animate);

    const time = Date.now() * 0.001;

    group.rotation.y += 0.005;
    group.rotation.x += 0.003;

    innerCube.rotation.y -= 0.01;
    innerCube.scale.setScalar(1 + Math.sin(time * 2) * 0.1);

    outerCube.rotation.x += 0.008;
    outerCube.scale.setScalar(1 + Math.cos(time * 1.5) * 0.05);

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_524 -->
</body>
</html>
