<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hero Game | MagnopVS</title>

    <link rel="stylesheet" href="hero-game.css">

</head>

<body>

    <!-- ===================================================== -->
    <!-- HERO GAME -->
    <!-- ===================================================== -->

    <main class="hero-scene">
        
        <div id="dialog-ui">

    <div id="portrait">

        <img id="portrait-img"
        src="https://jlckakyftkzgfgkmmdmc.supabase.co/storage/v1/object/public/Biblioteca/Imagenes/Assets/Personajes/NPCs/Conejo%20Cosmico/Conejo_Cosmico_Fase_Bebe.png">

    </div>

    <div id="dialog-window">

        <div id="dialog-name">

            ???

        </div>

        <div id="dialog-text">

        </div>

        <div id="dialog-next">

            ▶ Click para continuar

        </div>

    </div>

</div>
        <!-- ============================================== -->
        <!-- EFECTOS DEL PORTAL -->
        <!-- ============================================== -->

        <div class="portal">

            <!-- Nebulosa -->
            <div class="portal-nebula"></div>

            <!-- Aura -->
            <div class="portal-aura"></div>

            <!-- Anillos -->
            <div class="portal-ring ring-1"></div>
            <div class="portal-ring ring-2"></div>

            <!-- Partículas -->
            <div class="portal-particles"></div>
            
<!-- ===========================
DIALOGO
=========================== -->

<div id="dialog-ui" class="dialog-ui">

    <div class="dialog-box">

        <div id="dialog-name" class="dialog-name">
            Narrador
        </div>

        <div id="dialog-text" class="dialog-text">

        </div>

        <div class="dialog-input">

            <input
                id="dialog-answer"
                type="text"
                placeholder="Escribe tu respuesta...">

            <button id="dialog-send">
                Descubrir
            </button>

        </div>

    </div>

</div>
            <!-- ========================================== -->
            <!-- PERSONAJES -->
            <!-- ========================================== -->

            <div class="characters">

                <!-- Huevo -->

                <img
                    id="egg"
                    class="hero-character active"
                    src="https://jlckakyftkzgfgkmmdmc.supabase.co/storage/v1/object/public/Biblioteca/Imagenes/Assets/Personajes/NPCs/Conejo%20Cosmico/Huevo_Cosmico.png"
                    alt="Huevo Cósmico">
                <div id="fx-layer"></div>

                <!-- Eclosión -->

                <img
                    id="egg-crack"
                    class="hero-character"
                    src="https://jlckakyftkzgfgkmmdmc.supabase.co/storage/v1/object/public/Biblioteca/Imagenes/Assets/Personajes/NPCs/Conejo%20Cosmico/Huevo_Cosmico_Eclosion.png"
                    alt="Huevo Eclosionando">
                <div id="fx-layer"></div>

                <!-- Conejo Bebé -->

                <img
                    id="rabbit"
                    class="hero-character"
                    src="https://jlckakyftkzgfgkmmdmc.supabase.co/storage/v1/object/public/Biblioteca/Imagenes/Assets/Personajes/NPCs/Conejo%20Cosmico/Conejo_Cosmico_Fase_Bebe.png"
                    alt="Conejo Bebé">
                <div id="fx-layer"></div>

                <!-- Conejo Adulto -->

                <img
                    id="adult"
                    class="hero-character"
                    src="https://jlckakyftkzgfgkmmdmc.supabase.co/storage/v1/object/public/Biblioteca/Imagenes/Assets/Personajes/NPCs/Conejo%20Cosmico/Conejo_Cosmico_Fase_Adulto.png"
                    alt="Conejo Adulto">
                <div id="fx-layer"></div>

            </div>

            <!-- ========================================== -->
            <!-- OBJETOS -->
            <!-- ========================================== -->

            <div class="objects">

                <img
                    id="carrot"
                    src="https://jlckakyftkzgfgkmmdmc.supabase.co/storage/v1/object/public/Biblioteca/Imagenes/Assets/Personajes/NPCs/Conejo%20Cosmico/Zanahoria_Cosmica.png"
                    alt="Zanahoria Cósmica">

            </div>

        </div>

        <!-- ============================================== -->
        <!-- DIÁLOGOS -->
        <!-- ============================================== -->

        <section id="dialog-box">

            <div id="dialog-name">

                ???

            </div>

            <div id="dialog-text">

                ...

            </div>

        </section>

        <!-- ============================================== -->
        <!-- INTERFAZ -->
        <!-- ============================================== -->

        <aside class="ui">

            <button id="skip">

                Saltar

            </button>

            <button id="continue">

                Continuar

            </button>

        </aside>

        <!-- ============================================== -->
        <!-- AUDIO -->
        <!-- ============================================== -->

        <audio
            id="bgm"
            preload="auto"
            loop>
        </audio>

        <audio
            id="sfx"
            preload="auto">
        </audio>

    </main>

    <script src="hero-game.js"></script>

</body>

<script src="dialog-system.js"></script>
<script src="hero-game.js"></script>

</html>
