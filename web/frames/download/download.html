<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>MagnopVS | Download Center</title>

    <link
        rel="stylesheet"
        href="download.css">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;500;700;900&display=swap"
        rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
        rel="stylesheet">

</head>

<body>

<!-- ========================================================= -->
<!-- BACKGROUND -->
<!-- ========================================================= -->

<div class="background-grid"></div>

<div class="scanlines"></div>

<!-- ========================================================= -->
<!-- HEADER -->
<!-- ========================================================= -->

<header class="header">

    <a
        href="../banner/banner.html"
        class="back-button">

        <span class="material-symbols-outlined">
            arrow_back
        </span>

        HOME

    </a>

    <img
        src="../../../assets/logo/logo.png"
        alt="MagnopVS"
        class="logo">

</header>

<!-- ========================================================= -->
<!-- MAIN -->
<!-- ========================================================= -->

<main class="download-container">

    <!-- LEFT PANEL -->

    <section class="info-panel">

        <span class="status">

            ● ONLINE

        </span>

        <h1>

            DOWNLOAD CENTER

        </h1>

        <p>

            Synchronize your device with the MagnopVS Multiverse.

            Select your platform and begin your journey.

        </p>

        <div class="version-card">

            <div>

                <label>Current Version</label>

                <strong>v0.0.1 Alpha</strong>

            </div>

            <div>

                <label>Status</label>

                <strong>Coming Soon</strong>

            </div>

        </div>

    </section>

    <!-- PHONE -->

    <section class="phone-panel">

        <div class="phone">

            <div class="screen">

                <img
                    src="../../../assets/images/download-phone.png"
                    alt="MagnopVS App">

            </div>

        </div>

    </section>

    <!-- DOWNLOADS -->

    <section class="downloads">

        <h2>

            Available Platforms

        </h2>

        <button
            class="download-button android">

            <span class="material-symbols-outlined">

                android

            </span>

            Google Play

        </button>

        <button
            class="download-button apple">

            <span class="material-symbols-outlined">

                phone_iphone

            </span>

            App Store

        </button>

        <button
            class="download-button windows">

            <span class="material-symbols-outlined">

                desktop_windows

            </span>

            Windows

        </button>

        <button
            class="download-button linux">

            <span class="material-symbols-outlined">

                terminal

            </span>

            Linux

        </button>

        <button
            class="download-button apk">

            <span class="material-symbols-outlined">

                download

            </span>

            APK

        </button>

    </section>

</main>

<!-- ========================================================= -->
<!-- FOOTER -->
<!-- ========================================================= -->

<footer>

    MAGNOPVS © 2026

    •

    QUANTVM MATRIX

    •

    DOWNLOAD HUB

</footer>

<script src="download.js"></script>

</body>

</html>
